<svg width="1200" height="400" viewBox="0 0 1200 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <linearGradient id="reactGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#61dafb"/>
      <stop offset="100%" style="stop-color:#00d4ff"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGradient)"/>
  
  <!-- Grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#334155" stroke-width="0.5" opacity="0.3"/>
  </pattern>
  <rect width="1200" height="400" fill="url(#grid)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="150" fill="#3b82f6" opacity="0.05"/>
  <circle cx="1100" cy="300" r="200" fill="#8b5cf6" opacity="0.05"/>
  <circle cx="600" cy="400" r="180" fill="#ec4899" opacity="0.03"/>
  
  <!-- React icon (simplified) -->
  <g transform="translate(150, 200)">
    <ellipse cx="0" cy="0" rx="60" ry="25" fill="none" stroke="url(#reactGradient)" stroke-width="3" opacity="0.6"/>
    <ellipse cx="0" cy="0" rx="60" ry="25" fill="none" stroke="url(#reactGradient)" stroke-width="3" opacity="0.6" transform="rotate(60)"/>
    <ellipse cx="0" cy="0" rx="60" ry="25" fill="none" stroke="url(#reactGradient)" stroke-width="3" opacity="0.6" transform="rotate(120)"/>
    <circle cx="0" cy="0" r="12" fill="url(#reactGradient)"/>
  </g>
  
  <!-- DI Container icon -->
  <g transform="translate(1050, 200)">
    <rect x="-40" y="-50" width="80" height="100" rx="8" fill="none" stroke="url(#accentGradient)" stroke-width="3" opacity="0.6"/>
    <line x1="-25" y1="-25" x2="25" y2="-25" stroke="url(#accentGradient)" stroke-width="2" opacity="0.6"/>
    <line x1="-25" y1="0" x2="25" y2="0" stroke="url(#accentGradient)" stroke-width="2" opacity="0.6"/>
    <line x1="-25" y1="25" x2="25" y2="25" stroke="url(#accentGradient)" stroke-width="2" opacity="0.6"/>
    <circle cx="-15" cy="-25" r="4" fill="#3b82f6"/>
    <circle cx="-15" cy="0" r="4" fill="#8b5cf6"/>
    <circle cx="-15" cy="25" r="4" fill="#ec4899"/>
  </g>
  
  <!-- Main title -->
  <text x="600" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="700" fill="white">
    @abdokouta/ts-container
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="230" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#94a3b8">
    Dependency Injection for React
  </text>
  
  <!-- Tagline with gradient -->
  <text x="600" y="280" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="url(#accentGradient)">
    NestJS-style modules • TypeScript-first • Zero boilerplate
  </text>
  
  <!-- Bottom accent line -->
  <rect x="400" y="320" width="400" height="4" rx="2" fill="url(#accentGradient)" opacity="0.8"/>
</svg>
