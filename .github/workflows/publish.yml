# =============================================================================
# Publish all packages to npm
# =============================================================================
#
# All three packages share the same version (tightly coupled).
#
# Triggered by:
#   - Pushing a version tag (v*) — extracts version from the tag
#   - Manual workflow dispatch — publishes whatever version is in package.json
#
# The tag version is written into all three package.json files before publish.
# =============================================================================

name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: 📥 Install dependencies
        run: pnpm install --no-frozen-lockfile

      # ─────────────────────────────────────────────────────────────────────
      # Sync version from git tag into all package.json files
      # If triggered manually (no tag), skip this step — use existing versions
      # ─────────────────────────────────────────────────────────────────────
      - name: 🏷️ Sync version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "📦 Setting version to $VERSION across all packages"
          for pkg in packages/container packages/react packages/application; do
            node -e "
              const fs = require('fs');
              const path = './$pkg/package.json';
              const pkg = JSON.parse(fs.readFileSync(path, 'utf8'));
              pkg.version = '$VERSION';
              fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + '\n');
              console.log('  ✅ ' + pkg.name + '@$VERSION');
            "
          done

      - name: 🔨 Build all packages
        run: pnpm build --filter="@abdokouta/*"

      # ─────────────────────────────────────────────────────────────────────
      # Publish in dependency order:
      # 1. @abdokouta/ts-container (no deps)
      # 2. @abdokouta/ts-container-react (depends on ts-container)
      # 3. @abdokouta/ts-application (depends on ts-container)
      #
      # `|| true` skips already-published versions gracefully
      # ─────────────────────────────────────────────────────────────────────

      - name: 🚀 Publish @abdokouta/ts-container
        run: pnpm publish --access public --no-git-checks || true
        working-directory: packages/container
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: ⚛️ Publish @abdokouta/ts-container-react
        run: pnpm publish --access public --no-git-checks || true
        working-directory: packages/react
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: 🚀 Publish @abdokouta/ts-application
        run: pnpm publish --access public --no-git-checks || true
        working-directory: packages/application
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
